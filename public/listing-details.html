<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Listing Details</title>
    <meta name="description" content="View details for this accommodation on StayEZ.">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container" id="detail-container">
    <div class="loading"><div class="spinner"></div><span>Loading property details…</span></div>
</div>

<script src="/app.js"></script>
<script>
    const user = getUser();
    renderNav('/listings.html');

    const params = new URLSearchParams(window.location.search);
    const listingId = params.get('id');

    let allImages = [];
    let currentImageIndex = 0;

    if (!listingId) {
        document.getElementById('detail-container').innerHTML = `
            <div class="empty-state">
                <div class="empty-state-icon">❌</div>
                <h3>No property specified</h3>
                <a href="/listings.html" class="btn btn-primary" style="margin-top:16px">Browse Listings</a>
            </div>`;
    } else {
        loadListingDetails(listingId);
    }

    async function loadListingDetails(id) {
        try {
            const listing = await api('GET', '/listings/' + id);
            renderDetails(listing);
        } catch (err) {
            document.getElementById('detail-container').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <h3>Property not found</h3>
                    <p>${err.message}</p>
                </div>`;
        }
    }

    function renderDetails(listing) {
        const price = listing.price ? `₱${Number(listing.price).toLocaleString()}` : 'N/A';
        const mainImage = listing.image || '/images/bedroom-balcony.jpg';
        allImages = (listing.images && listing.images.length > 0) ? listing.images : [mainImage];
        currentImageIndex = 0;

        let thumbsHtml = '';
        if (allImages.length > 4) {
            thumbsHtml = `
                <div class="detail-thumbs-carousel-wrapper">
                    <button type="button" class="carousel-arrow prev-arrow" onclick="navigateImages(-1)" aria-label="Previous Image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                    </button>
                    <div class="detail-thumbs-scroll-container" id="thumbs-scroll-container">
                        ${allImages.map((imgSrc, index) => `
                            <img src="${imgSrc}" class="detail-thumb ${index === 0 ? 'active' : ''}" onclick="selectImage(${index})" onerror="this.src='/images/bedroom-balcony.jpg'">
                        `).join('')}
                    </div>
                    <button type="button" class="carousel-arrow next-arrow" onclick="navigateImages(1)" aria-label="Next Image">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
                    </button>
                </div>
            `;
        } else {
            thumbsHtml = `
                <div class="detail-thumbs-grid">
                    ${allImages.map((imgSrc, index) => `
                        <img src="${imgSrc}" class="detail-thumb ${index === 0 ? 'active' : ''}" onclick="selectImage(${index})" onerror="this.src='/images/bedroom-balcony.jpg'">
                    `).join('')}
                </div>
            `;
        }

        document.getElementById('detail-container').innerHTML = `
            <!-- Back Arrow Navigation -->
            <button class="back-btn-circle" onclick="window.history.back()" aria-label="Go Back">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>

            <div class="detail-layout">
                <!-- Left Column: Primary Image & Thumbs Grid/Carousel -->
                <div class="detail-images-section">
                    <img id="primary-view-img" src="${mainImage}" 
                         onerror="this.src='/images/bedroom-balcony.jpg'"
                         class="detail-primary-image" alt="${listing.name}">
                    
                    ${thumbsHtml}
                </div>

                <!-- Right Column: Information, Description & Book Now -->
                <div class="detail-info-section">
                    <div class="detail-header-row">
                        <div>
                            <span class="listing-type-badge inline ${listing.type}" style="margin-bottom: 8px;">${listing.type.replace('_', ' ')}</span>
                            <h1 class="page-title" style="font-size: 2.2rem;">${listing.name}</h1>
                            <p style="color:var(--text-secondary); margin-top:6px; font-size:1.05rem; display: flex; align-items: center; gap: 4px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loc-pin-svg" viewBox="0 0 24 24" style="color: var(--accent-brown);"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                <span style="font-style: italic;">${listing.location}</span>
                            </p>
                        </div>
                        <div class="detail-price-badge">
                            ${price}/night
                        </div>
                    </div>

                    <div class="detail-desc">
                        ${listing.description || 'No description provided.'}
                    </div>

                    <div style="display: flex; justify-content: flex-end; margin-top: 40px;">
                        <button id="book-btn" class="btn btn-primary btn-lg" style="border-radius: 30px; letter-spacing: 0.5px;">
                            BOOK NOW
                        </button>
                    </div>
                </div>
            </div>
        `;

        document.getElementById('book-btn').addEventListener('click', () => {
            if (!user) {
                showToast('Please log in as a Guest to book stays.', 'info');
                setTimeout(() => window.location.href = '/index.html', 1500);
                return;
            }
            if (user.role !== 'Guest') {
                showToast(`Hosts and Admins cannot book stays. Log in as Guest.`, 'error');
                return;
            }
            window.location.href = `/book.html?id=${listing._id}`;
        });
    }

    window.selectImage = function(index) {
        currentImageIndex = index;
        updateActiveImage();
    }

    window.navigateImages = function(direction) {
        if (allImages.length <= 1) return;
        currentImageIndex = (currentImageIndex + direction + allImages.length) % allImages.length;
        updateActiveImage();
    }

    function updateActiveImage() {
        const primaryImg = document.getElementById('primary-view-img');
        if (primaryImg) {
            primaryImg.src = allImages[currentImageIndex];
        }

        // Highlight the active thumbnail
        const thumbs = document.querySelectorAll('.detail-thumb');
        thumbs.forEach((thumb, idx) => {
            if (idx === currentImageIndex) {
                thumb.classList.add('active');
                
                // Automatically scroll the thumbnail into view (center aligned)
                thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else {
                thumb.classList.remove('active');
            }
        });
    }
</script>
</body>
</html>
