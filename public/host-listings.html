<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — My Listings</title>
    <meta name="description" content="Manage your property listings on StayEZ as a host.">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    
    <!-- ── LISTINGS GRID VIEW (Mockup 6) ── -->
    <div id="view-listings-list">
        <div class="page-header">
            <div>
                <h1 class="page-title">My Listings</h1>
                <p style="color:var(--text-secondary); margin-top:4px;">Create and manage your properties</p>
            </div>
            <button onclick="openCreateView()" class="btn btn-outline" style="border-radius: 20px;">+ Create Listing</button>
        </div>

        <div id="listings-container">
            <div class="loading"><div class="spinner"></div><span>Loading your listings…</span></div>
        </div>
    </div>

    <!-- ── FORM VIEW (Mockups 11, 12, 13, 14) ── -->
    <div id="view-listing-form-container" style="display: none;">
        <!-- Back Arrow -->
        <button class="back-btn-circle" onclick="showListingsView()">⬅</button>

        <div style="margin-bottom: 32px;">
            <h1 class="page-title" id="form-view-title">Create Listing</h1>
            <p style="color:var(--text-secondary); margin-top:4px;">Share your space and host unforgettable experiences</p>
        </div>

        <!-- Form Card wrapper -->
        <div id="form-card-theme" class="form-card">
            <form id="listing-form" novalidate>
                <input type="hidden" id="listing-id">
                
                <h3 style="font-family: var(--font-serif); font-size: 1.5rem; text-align: center; margin-bottom: 30px; font-weight: 500;">
                    Enter Listing Details:
                </h3>

                <div class="form-group">
                    <label class="form-label" for="f-name">NAME</label>
                    <input type="text" id="f-name" class="form-input" placeholder="e.g. Cozy Beachside Studio" required>
                </div>

                <div class="form-group">
                    <label class="form-label">TYPE</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="hotel"> Hotel</label>
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="apartment"> Apartment</label>
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="dorm"> Dorm</label>
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="guest_room"> Guestroom</label>
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="studio"> Studio</label>
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="cabin"> Cabin</label>
                        <label class="checkbox-item"><input type="checkbox" name="type-opt" value="loft"> Loft</label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-location">LOCATION</label>
                    <input type="text" id="f-location" class="form-input" placeholder="e.g. Makati City, Metro Manila" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-price">PRICE (per night)</label>
                    <input type="number" id="f-price" class="form-input" placeholder="e.g. 1500" min="0" step="1" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-description">DESCRIPTION</label>
                    <textarea id="f-description" class="form-textarea" placeholder="Describe your property details…" required></textarea>
                </div>

                <!-- Attachment Upload Image Picker -->
                <div class="form-group">
                    <label class="form-label" for="f-image-text">IMAGES (Paste URL + Enter, or select files)</label>
                    <div class="input-with-attachment">
                        <input type="text" id="f-image-text" class="form-input" placeholder="Paste image URL (press Enter) or upload files...">
                        <button type="button" class="attachment-btn" onclick="document.getElementById('f-image-file').click()">📎</button>
                        <input type="file" id="f-image-file" accept="image/jpeg, image/png, image/webp" multiple style="display: none;">
                    </div>
                    <div id="image-previews-container" style="display: none; margin-top: 12px;">
                        <div id="image-previews-grid" class="image-previews-grid"></div>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 36px;">
                    <label class="form-label" for="f-contact">Contact Number</label>
                    <input type="tel" id="f-contact" class="form-input" placeholder="09XX-XXX-XXXX" required>
                </div>

                <div id="form-error" class="error-box" style="margin-bottom: 24px;"></div>

                <button type="submit" id="form-submit-btn" class="btn btn-full btn-lg" style="letter-spacing: 0.5px;">
                    POSTLISTING
                </button>
            </form>
        </div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Host']);
    let editingId = null;
    let currentListingImages = [];

    if (user) { renderNav('/host-listings.html'); loadListings(); }

    /* ─ Checkbox Radio behavior ─────────────────────────────────────────────── */
    const typeCheckboxes = document.querySelectorAll('input[name="type-opt"]');
    typeCheckboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            if (cb.checked) {
                typeCheckboxes.forEach(other => { if (other !== cb) other.checked = false; });
            }
        });
    });

    /* ─ Image Attachment Logic ─────────────────────────────────────────────── */
    const fileInput = document.getElementById('f-image-file');
    const filenameInput = document.getElementById('f-image-text');

    fileInput.addEventListener('change', async (e) => {
        if (e.target.files && e.target.files.length > 0) {
            const files = Array.from(e.target.files);
            const submitBtn = document.getElementById('form-submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing images...';

            for (const file of files) {
                await handleImageUpload(file);
            }

            renderImagePreviews();
            fileInput.value = ''; // Reset file input

            submitBtn.disabled = false;
            submitBtn.textContent = 'POSTLISTING';
        }
    });

    // Support typing/pasting a URL and pressing Enter to add it
    filenameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = filenameInput.value.trim();
            if (val && !/^\d+ image\(s\) (selected|loaded)$/i.test(val)) {
                currentListingImages.push(val);
                renderImagePreviews();
                filenameInput.value = '';
                showToast('Image URL added!', 'success');
            }
        }
    });

    // Clear count message on focus so user can type/paste a URL easily
    filenameInput.addEventListener('focus', () => {
        const val = filenameInput.value.trim();
        if (/^\d+ image\(s\) (selected|loaded)$/i.test(val)) {
            filenameInput.value = '';
        }
    });

    // Restore count message on blur if input was left empty
    filenameInput.addEventListener('blur', () => {
        const val = filenameInput.value.trim();
        if (!val && currentListingImages.length > 0) {
            filenameInput.value = `${currentListingImages.length} image(s) ${editingId ? 'loaded' : 'selected'}`;
        }
    });

    async function handleImageUpload(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const maxDim = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > maxDim || height > maxDim) {
                        if (width > height) {
                            height = Math.round((height * maxDim) / width);
                            width = maxDim;
                        } else {
                            width = Math.round((width * maxDim) / height);
                            height = maxDim;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                    currentListingImages.push(dataUrl);
                    resolve();
                };
                img.onerror = () => resolve();
                img.src = e.target.result;
            };
            reader.onerror = () => resolve();
            reader.readAsDataURL(file);
        });
    }

    function renderImagePreviews() {
        const grid = document.getElementById('image-previews-grid');
        const container = document.getElementById('image-previews-container');

        if (!currentListingImages || currentListingImages.length === 0) {
            grid.innerHTML = '';
            container.style.display = 'none';
            filenameInput.value = '';
            return;
        }

        container.style.display = 'block';
        filenameInput.value = `${currentListingImages.length} image(s) selected`;

        grid.innerHTML = currentListingImages.map((img, index) => `
            <div class="image-preview-item">
                <img src="${img}" onerror="this.src='/images/bedroom-balcony.jpg'">
                <button type="button" class="remove-btn" onclick="removeImage(${index})">&times;</button>
            </div>
        `).join('');
    }

    window.removeImage = function(index) {
        currentListingImages.splice(index, 1);
        renderImagePreviews();
    };

    /* ─ Load & Render Listings ─────────────────────────────────────────────── */
    async function loadListings() {
        try {
            const listings = await api('GET', '/listings/host');
            renderListings(listings);
        } catch (err) {
            document.getElementById('listings-container').innerHTML =
                `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderListings(listings) {
        const container = document.getElementById('listings-container');
        if (!listings.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🏡</div>
                    <h3>No listings yet</h3>
                    <p>Create your first property to start accepting bookings.</p>
                    <button onclick="openCreateView()" class="btn btn-primary" style="margin-top:20px">+ Add Listing</button>
                </div>`;
            return;
        }

        container.innerHTML = listings.map(l => {
            const price  = l.price ? `₱${Number(l.price).toLocaleString()}` : '—';
            const imgSrc = l.image || '/images/bedroom-balcony.jpg';
            const isRemoved = l.isRemoved;
            return `
                <div class="host-listing-card ${isRemoved ? 'removed' : ''}">
                    <!-- Left: Listing image with ribbon badge -->
                    <div style="position: relative; flex-shrink: 0;">
                        <img src="${imgSrc}" class="host-listing-img" onerror="this.src='/images/bedroom-balcony.jpg'">
                        <span class="ribbon-badge ${l.type}">${l.type.replace('_', ' ')}</span>
                    </div>

                    <!-- Right: Listing details and host operations -->
                    <div class="host-listing-details">
                        <div class="host-listing-row">
                            <h2 style="font-family: var(--font-serif); font-size: 1.8rem; font-weight: 500;">${l.name}</h2>
                            <span class="host-listing-price">${price}<small style="font-size:0.8rem; font-weight:400; color:var(--text-light-muted);">/night</small></span>
                        </div>
                        <p style="font-size:0.85rem; color:var(--text-light-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 4px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loc-pin-svg" viewBox="0 0 24 24" style="color: var(--text-light-muted);"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            <span style="font-style: italic;">${l.location}</span>
                        </p>
                        <p style="font-size:0.85rem; color:var(--text-light-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                            "${l.description}"
                        </p>
                        
                        <div class="host-listing-actions">
                            ${isRemoved ? `
                                <span style="color:#ff8e8e; font-size: 0.95rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px;">⚠️ Listing Removed</span>
                                <button onclick="deleteListing('${l._id}', true)" class="btn btn-danger btn-sm" style="margin-left: auto;">🗑️ Delete Record</button>
                                <a href="/host-bookings.html?listing=${l._id}" class="btn btn-primary btn-sm" style="background-color: var(--accent-teal);">📄 Requests</a>
                            ` : `
                                <a href="/host-bookings.html?listing=${l._id}" class="btn btn-primary btn-sm" style="background-color: var(--accent-teal);">📄 Requests</a>
                                <button onclick='triggerEditView(${JSON.stringify(l).replace(/'/g,"&#39;")})' class="btn btn-secondary btn-sm">📝 Edit</button>
                                <button onclick="deleteListing('${l._id}', false)" class="btn btn-danger btn-sm">🗑️ Delete</button>
                            `}
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    /* ─ View Toggle Methods ────────────────────────────────────────────────── */
    function showListingsView() {
        document.getElementById('view-listings-list').style.display = 'block';
        document.getElementById('view-listing-form-container').style.display = 'none';
        loadListings();
    }

    function openCreateView() {
        editingId = null;
        currentListingImages = [];
        renderImagePreviews();
        
        document.getElementById('form-view-title').textContent = 'Create Listing';
        
        // Setup Create card background (greyish-brown) & postlisting button (teal)
        const themeCard = document.getElementById('form-card-theme');
        themeCard.className = 'form-card form-card-light';
        
        const submitBtn = document.getElementById('form-submit-btn');
        submitBtn.className = 'btn btn-primary btn-full btn-lg';
        
        document.getElementById('listing-form').reset();
        filenameInput.value = '';
        document.getElementById('form-error').style.display = 'none';
        
        // Reset checkboxes
        typeCheckboxes.forEach(cb => cb.checked = false);

        document.getElementById('view-listings-list').style.display = 'none';
        document.getElementById('view-listing-form-container').style.display = 'block';
    }

    function triggerEditView(listing) {
        editingId = listing._id;
        currentListingImages = listing.images && listing.images.length > 0 ? [...listing.images] : (listing.image ? [listing.image] : []);
        renderImagePreviews();
        
        document.getElementById('form-view-title').textContent = 'Edit Listing';

        // Setup Edit card background (dark-teal) & postlisting button (greyish-brown)
        const themeCard = document.getElementById('form-card-theme');
        themeCard.className = 'form-card form-card-dark';
        
        const submitBtn = document.getElementById('form-submit-btn');
        submitBtn.className = 'btn btn-secondary btn-full btn-lg';

        document.getElementById('f-name').value = listing.name;
        document.getElementById('f-location').value = listing.location;
        document.getElementById('f-price').value = listing.price;
        document.getElementById('f-description').value = listing.description;
        document.getElementById('f-contact').value = listing.contactNumber;
        filenameInput.value = currentListingImages.length > 0 ? `${currentListingImages.length} image(s) loaded` : '';
        document.getElementById('form-error').style.display = 'none';

        // Check correct type checkbox
        typeCheckboxes.forEach(cb => {
            cb.checked = (cb.value === listing.type);
        });

        document.getElementById('view-listings-list').style.display = 'none';
        document.getElementById('view-listing-form-container').style.display = 'block';
    }

    /* ─ Form submit (create or edit) ──────────────────────────────────────── */
    document.getElementById('listing-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = document.getElementById('form-submit-btn');
        const errEl = document.getElementById('form-error');

        errEl.style.display = 'none';
        
        const checkedTypecb = Array.from(typeCheckboxes).find(cb => cb.checked);
        const selectedType = checkedTypecb ? checkedTypecb.value : "";

        if (!selectedType) {
            errEl.textContent   = "Please select a property type.";
            errEl.style.display = 'block';
            return;
        }

        // If there's a pending URL typed/pasted in the input that hasn't been submitted via Enter
        const pendingUrl = filenameInput.value.trim();
        if (pendingUrl && !/^\d+ image\(s\) (selected|loaded)$/i.test(pendingUrl)) {
            currentListingImages.push(pendingUrl);
        }

        btn.disabled    = true;
        btn.textContent = 'Saving…';

        const data = {
            name:          document.getElementById('f-name').value.trim(),
            type:          selectedType,
            price:         parseFloat(document.getElementById('f-price').value),
            location:      document.getElementById('f-location').value.trim(),
            description:   document.getElementById('f-description').value.trim(),
            image:         currentListingImages[0] || '/images/bedroom-balcony.jpg',
            images:        currentListingImages,
            contactNumber: document.getElementById('f-contact').value.trim(),
        };

        try {
            if (editingId) {
                await api('PUT', '/listings/' + editingId, data);
                showToast('Listing updated!', 'success');
            } else {
                await api('POST', '/listings', data);
                showToast('Listing created!', 'success');
            }
            showListingsView();
        } catch (err) {
            errEl.textContent   = err.message;
            errEl.style.display = 'block';
        } finally {
            btn.disabled    = false;
            btn.textContent = 'POSTLISTING';
        }
    });

    /* ─ Delete ─────────────────────────────────────────────────────────────── */
    async function deleteListing(id, isRemoved = false) {
        const title = isRemoved ? 'Permanently Delete Record?' : 'Delete Listing?';
        const msg = isRemoved 
            ? 'Are you sure you want to permanently remove this listing from your records? This action cannot be undone.'
            : 'Are you sure you want to delete this listing? This cannot be undone.';
        const confirmed = await showConfirm(title, msg);
        if (!confirmed) return;
        try {
            await api('DELETE', '/listings/' + id);
            showToast(isRemoved ? 'Listing record permanently removed.' : 'Listing deleted.', 'success');
            loadListings();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }
</script>
</body>
</html>
