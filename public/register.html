<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — Create Account</title>
    <meta name="description" content="Create your StayEZ account to start booking or listing properties.">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="welcome-page">

<div class="welcome-card">
    <h2 class="welcome-title">Create Account</h2>

    <form id="register-form">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" class="form-input" required autocomplete="name">
        </div>
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" required autocomplete="email">
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group" style="margin-bottom: 30px;">
            <label class="form-label">I want to be a…</label>
            <div class="role-toggle-group">
                <button type="button" class="role-toggle-btn active" data-role="Guest">Guest</button>
                <button type="button" class="role-toggle-btn" data-role="Host">Host</button>
            </div>
            <input type="hidden" id="role" value="Guest" required>
        </div>
        <div id="reg-error" class="error-box"></div>
        <button type="submit" id="reg-btn" class="welcome-btn-login">Create Account</button>
    </form>

    <div class="welcome-footer">
        Already have an account? <a href="/index.html">Sign In</a>
    </div>
</div>

<script src="/app.js"></script>
<script>
    // Toggle role selector buttons
    const roleBtns = document.querySelectorAll('.role-toggle-btn');
    const roleInput = document.getElementById('role');

    roleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            roleBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            roleInput.value = btn.getAttribute('data-role');
        });
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn   = document.getElementById('reg-btn');
        const errEl = document.getElementById('reg-error');

        errEl.style.display = 'none';
        btn.disabled    = true;
        btn.textContent = 'Creating account…';

        try {
            await api('POST', '/auth/register', {
                name:     document.getElementById('name').value.trim(),
                email:    document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                role:     roleInput.value,
            });
            showToast('Account created! Please sign in.', 'success');
            setTimeout(() => window.location.href = '/index.html', 1600);
        } catch (err) {
            errEl.textContent   = err.message;
            errEl.style.display = 'block';
            btn.disabled        = false;
            btn.textContent     = 'Create Account';
        }
    });
</script>
</body>
</html>
