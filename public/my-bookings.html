<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayEZ — My Bookings</title>
    <meta name="description" content="View and track your booking statuses on StayEZ.">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav id="main-nav"></nav>

<div class="page-container">
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 class="page-title">My Bookings</h1>
        <p style="color:var(--text-secondary); margin-top:6px; font-size:1.05rem;">Track your reservations</p>
    </div>

    <div id="bookings-container">
        <div class="loading"><div class="spinner"></div><span>Loading your bookings…</span></div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    const user = requireAuth(['Guest']);
    if (user) { renderNav('/my-bookings.html'); loadBookings(); }

    async function loadBookings() {
        try {
            const bookings = await api('GET', '/bookings/mine');
            renderBookings(bookings);
        } catch (err) {
            document.getElementById('bookings-container').innerHTML =
                `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${err.message}</h3></div>`;
        }
    }

    function renderBookings(bookings) {
        const container = document.getElementById('bookings-container');

        if (!bookings.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📅</div>
                    <h3>No bookings yet</h3>
                    <p>Browse listings and book your first stay!</p>
                    <a href="/listings.html" class="btn btn-primary" style="margin-top:20px">Browse Listings</a>
                </div>`;
            return;
        }

        container.innerHTML = bookings.map(b => {
            const l           = b.listingId;
            const isRemoved   = !l || l.isRemoved;
            const name        = l ? l.name     : (b.listingName || 'Listing Removed');
            const location    = l ? l.location : (b.listingLocation || 'N/A');
            const type        = l ? l.type     : (b.listingType || 'N/A');
            const imgSrc      = l && l.image ? l.image : (b.listingImage || '/images/bedroom-balcony.jpg');
            const isApproved  = b.status === 'approved';

            // Custom Contact Reveal Bar (Mockup 7) - only show once approved
            const contactHtml = isApproved && l && l.contactNumber && !isRemoved
                ? `<div class="booking-host-contact-bar">
                       <span style="font-weight: 700; display: inline-flex; align-items: center; gap: 8px;">
                           📞 Host Contact
                       </span>
                       <span style="font-weight: 700; font-family: monospace; letter-spacing: 0.5px;">
                           ${l.contactNumber}
                       </span>
                   </div>`
                : '';

            return `
                <div class="booking-card ${isRemoved ? 'removed' : ''}">
                    <div class="booking-card-main">
                        <!-- Left image with type ribbon badge -->
                        <div class="booking-img-container">
                            <img src="${imgSrc}"
                                 onerror="this.src='/images/bedroom-balcony.jpg'"
                                 alt="${name}">
                            <span class="ribbon-badge">${type}</span>
                        </div>

                        <!-- Right details -->
                        <div class="booking-content">
                            <div class="booking-header">
                                <div>
                                    <h3 class="booking-title">${name}</h3>
                                    ${isRemoved ? `<span style="color:#ff8e8e; font-size: 0.85rem; font-weight: 600; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px;">⚠️ Listing Removed</span>` : ''}
                                </div>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    ${isRemoved ? `<button onclick="deleteBooking('${b._id}')" class="btn btn-danger btn-sm" style="padding: 6px 12px; font-size: 0.75rem; border: none; background-color: var(--danger);">🗑️ Delete</button>` : ''}
                                    ${statusBadge(b.status)}
                                </div>
                            </div>
                            <p class="booking-location">📍 ${location}</p>
                            <p class="booking-dates">Dates: ${formatDate(b.startDate)} - ${formatDate(b.endDate)}</p>
                        </div>
                    </div>

                    <!-- Bottom full-width host contact bar -->
                    ${contactHtml}
                </div>`;
        }).join('');
    }

    async function deleteBooking(id) {
        const confirmed = await showConfirm('Remove Booking Record?', 'Are you sure you want to remove this booking record?');
        if (!confirmed) return;
        try {
            await api('DELETE', '/bookings/' + id);
            showToast('Booking record removed.', 'success');
            loadBookings();
        } catch (err) {
            showToast(err.message, 'error');
        }
    }
</script>
</body>
</html>
